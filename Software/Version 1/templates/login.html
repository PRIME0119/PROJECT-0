<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Project 0 Version 1</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <script>
        // Check theme immediately to prevent flash
        if(localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --glass-bg: rgba(20, 30, 45, 0.35);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            --accent-violet: #8b5cf6;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --bg-3: #1e0338;
            --orb-1: #6366f1; /* indigo-500 */
            --orb-2: #a855f7; /* purple-500 */
            --input-bg: rgba(0, 0, 0, 0.2);
            --input-focus-bg: rgba(0, 0, 0, 0.4);
            --btn-grad-1: #6c4cff;
            --btn-grad-2: #9c6dff;
        }

        html.light-theme {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 20px 50px rgba(100, 150, 255, 0.15);
            --accent-violet: #3b82f6; /* bright blue */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-1: #e0f2fe; /* sky-100 */
            --bg-2: #f0f9ff; /* sky-50 */
            --bg-3: #bae6fd;
            --orb-1: #93c5fd; /* blue-300 */
            --orb-2: #67e8f9; /* cyan-300 */
            --input-bg: rgba(255, 255, 255, 0.6);
            --input-focus-bg: rgba(255, 255, 255, 0.9);
            --btn-grad-1: #3b82f6;
            --btn-grad-2: #60a5fa;
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 400% 400%;
            height: 100vh; /* Fallback */
            height: 100dvh;
            overflow: hidden;
            color: var(--text-main);
            animation: gradientBG 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            transition: background 0.8s ease, color 0.8s ease;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        .blur-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            z-index: -1;
        }

        .glass-login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            width: 90%;
            max-width: 320px; /* ~30% smaller max width */
            padding: 1.5rem 1.5rem; /* ~30% smaller padding */
            animation: fadeIn 0.8s ease-out;
            box-sizing: border-box;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.6s ease, background 0.8s ease;
            transform-style: preserve-3d;
        }
        
        @media (min-width: 768px) {
            .glass-login-card {
                max-width: 380px;
                padding: 2.5rem 2rem;
            }
        }
        
        /* 3D hover on the card */
        .glass-login-card:hover {
            transform: translateZ(20px) rotateX(1deg) rotateY(-1deg);
            box-shadow: 0 25px 60px rgba(99, 102, 241, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        html.light-theme .glass-login-card:hover {
            box-shadow: 0 25px 60px rgba(59, 130, 246, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .title-text {
            font-size: 1.5rem; /* ~30% smaller on mobile */
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text-main) 0%, var(--btn-grad-2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(30px);
        }
        
        @media (min-width: 768px) {
            .title-text {
                font-size: 2rem;
                margin-bottom: 2rem;
            }
        }

        .glass-input {
            width: 100%;
            background: var(--input-bg);
            border: var(--glass-border);
            border-radius: 12px;
            padding: 0.6rem 0.8rem; /* Scaled down padding */
            color: var(--text-main);
            font-size: 0.875rem; /* Scaled down font */
            margin-bottom: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            outline: none;
            transform: translateZ(10px);
        }
        
        @media (min-width: 768px) {
            .glass-input {
                padding: 0.875rem 1rem;
                font-size: 1rem;
                margin-bottom: 1.25rem;
            }
        }

        /* 3D scaling focus glow on inputs */
        .glass-input:focus {
            background: var(--input-focus-bg);
            border-color: var(--accent-violet);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.5), inset 0 0 10px rgba(139, 92, 246, 0.3);
            transform: translateZ(25px) scale(1.02);
        }
        
        html.light-theme .glass-input:focus {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4), inset 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .glass-input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
            transform: translateZ(5px);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--btn-grad-1), var(--btn-grad-2));
            border: none;
            border-radius: 12px;
            color: white; /* button text stays white */
            font-size: 0.875rem; /* Scaled down */
            font-weight: 600;
            padding: 0.75rem; /* Scaled down */
            margin-top: 0.5rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(108, 76, 255, 0.4);
            transform: translateZ(15px);
        }

        @media (min-width: 768px) {
            .login-btn {
                font-size: 1rem;
                padding: 1rem;
                margin-top: 1rem;
            }
        }

        /* 3D energetic hover on sign in button */
        .login-btn:hover {
            transform: translateZ(35px) scale(1.03);
            box-shadow: 0 10px 30px rgba(108, 76, 255, 0.7), 0 0 20px rgba(108, 76, 255, 0.4);
            filter: brightness(1.1);
        }

        html.light-theme .login-btn:hover {
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.6), 0 0 20px rgba(59, 130, 246, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1.5rem;
            transform: translateZ(10px);
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateZ(10px) translateX(0); }
            25% { transform: translateZ(10px) translateX(-5px); }
            50% { transform: translateZ(10px) translateX(5px); }
            75% { transform: translateZ(10px) translateX(-5px); }
        }
        
        .footer-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
            transform: translateZ(5px);
        }
        .footer-link:hover {
            filter: brightness(1.5);
            color: var(--accent-violet);
        }
        
        /* Particles for light theme */
        .snow-particle {
            display: none;
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px white;
            z-index: -1;
            animation: fall linear infinite;
        }
        html.light-theme .snow-particle {
            display: block;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

    </style>
</head>
<body>
    <div id="particles-container"></div>
    <div class="blur-bg"></div>
    
    <!-- Animated background elements -->
    <div class="fixed inset-0 overflow-hidden -z-10 bg-transparent transition-colors duration-700">
        <div class="absolute w-64 h-64 rounded-full opacity-20 blur-3xl -top-32 -left-32 transition-colors duration-700" style="background-color: var(--orb-1)"></div>
        <div class="absolute w-96 h-96 rounded-full opacity-20 blur-3xl -bottom-32 -right-32 transition-colors duration-700" style="background-color: var(--orb-2)"></div>
    </div>
    
    <div class="glass-login-card">
        <h1 class="title-text">Welcome Back</h1>
        
        {% if error %}
        <div class="error-msg">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div>
                <label class="input-label">Username</label>
                <input type="text" name="username" required class="glass-input" placeholder="Enter username">
            </div>
            
            <div>
                <label class="input-label">Password</label>
                <input type="password" name="password" required class="glass-input" placeholder="Enter password">
            </div>
            
            <button type="submit" class="login-btn">
                Sign In
            </button>
        </form>
        
        <a href="#" class="footer-link">Need help? Contact support</a>
    </div>

    <script>
        // Generate particles for light theme
        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 50; i++) {
                let p = document.createElement('div');
                p.classList.add('snow-particle');
                p.style.width = Math.random() * 5 + 2 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = -10 + 'px';
                p.style.opacity = Math.random();
                p.style.animationDuration = Math.random() * 8 + 4 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // Listen for storage changes if theme toggled in another tab
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                if (e.newValue === 'light') document.documentElement.classList.add('light-theme');
                else document.documentElement.classList.remove('light-theme');
            }
        });
    </script>
</body>
</html>
