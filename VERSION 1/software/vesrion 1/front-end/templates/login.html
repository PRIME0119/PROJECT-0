<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dual System Controller</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgba(99, 102, 241, 0.8)',
                        secondary: 'rgba(167, 139, 250, 0.8)',
                        dark: 'rgba(15, 23, 42, 0.8)'
                    },
                    boxShadow: {
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.1)',
                        'neon': '0 0 10px rgba(99, 102, 241, 0.8)'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            animation: fadeIn 0.8s ease-out;
        }
        
        .btn-primary {
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        
        .power-btn {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .power-btn.active {
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.7);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
    </style>
</head>
<body class="text-gray-100">
    <!-- Animated background elements -->
    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="absolute w-64 h-64 rounded-full bg-primary opacity-20 blur-3xl -top-32 -left-32"></div>
        <div class="absolute w-96 h-96 rounded-full bg-secondary opacity-20 blur-3xl -bottom-32 -right-32"></div>
    </div>
    
    <!-- Main content -->
    <div class="container mx-auto px-4 py-16 min-h-screen flex flex-col">
        <div class="flex-grow flex flex-col items-center justify-center">
            <div class="glass-card p-8 w-full max-w-md text-center">
                <h1 class="text-3xl md:text-4xl font-bold mb-8 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-300">
                    Welcome Back
                </h1>
                
                {% if error %}
                <div class="mb-4 px-4 py-2 bg-red-900/30 rounded-lg border border-red-500 text-red-300">
                    {{ error }}
                </div>
                {% endif %}
                
                <form method="POST" action="/login" class="space-y-6">
                    <div class="text-left">
                        <label class="block text-gray-300 mb-2">Username</label>
                        <input type="text" name="username" required 
                               class="w-full px-4 py-3 bg-gray-800/50 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    
                    <div class="text-left">
                        <label class="block text-gray-300 mb-2">Password</label>
                        <input type="password" name="password" required
                               class="w-full px-4 py-3 bg-gray-800/50 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    
                    <button type="submit" 
                            class="btn-primary w-full px-6 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-white font-semibold">
                        Login
                    </button>
                </form>
            </div>

            <p class="mt-8 text-gray-400">
                Need help? <a href="#" class="text-indigo-300 hover:underline">Contact support</a>
            </p>
        </div>
        
        <footer class="mt-12 text-center text-gray-400 text-sm">
            <p>© Dual System Controller | Made with ❤ by Prime</p>
        </footer>
    </div>
</body>
</html>
