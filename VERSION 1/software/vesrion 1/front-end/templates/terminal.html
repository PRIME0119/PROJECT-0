<!-- templates/terminal.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <title>Web Terminal</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Poppins', monospace;
      margin: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #00ff00;
    }
    .glass {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
    }
    #terminal {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #input {
      width: 100%;
      padding: 12px;
      background-color: rgba(30, 30, 30, 0.9);
      color: #00ff00;
      border: none;
      outline: none;
      font-family: monospace;
      position: sticky;
      bottom: 0;
    }

    .back-button {
      background-color: #3a86ff; /* Button color */
      color: white; /* Text color */
      padding: 10px 20px; /* Padding */
      border: none; /* No border */
      border-radius: 5px; /* Rounded corners */
      cursor: pointer; /* Pointer cursor */
      transition: background-color 0.3s; /* Transition effect */
      margin-bottom: 10px; /* Space below the button */
    }
    .back-button:hover {
      background-color: #2a65cc; /* Darker shade on hover */
    }
  </style>
</head>
<body>
  <div class="glass m-4 p-4 shadow-lg flex flex-col h-[calc(100dvh-2rem)]">
    <button class="back-button" onclick="window.location.href='/control_panel'">Back to Control Panel</button>
    <div id="terminal"></div>
    <input id="input" type="text" placeholder="Enter command and press Enter" autocomplete="off"/>
  </div>

  <script>
    const terminal = document.getElementById('terminal');
    const input = document.getElementById('input');
    const socket = io('/terminal');

    socket.on('connect', () => {
      terminal.innerText += '[Connected to Terminal]\n';
    });

    socket.on('terminal_output', data => {
      terminal.innerText += data.data;
      requestAnimationFrame(() => {
        terminal.scrollTop = terminal.scrollHeight;
     });
    });

    input.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = this.value.trim();
    if (cmd.length > 0) {
      socket.emit('terminal_input', { data: cmd + '\n' });
      terminal.innerText += '> ' + cmd + '\n';
    }
    this.value = '';
  }
});
setTimeout(() => input.focus(), 300);
  </script>
</body>
</html>
