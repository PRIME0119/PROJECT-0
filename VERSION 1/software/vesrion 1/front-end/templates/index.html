<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgba(99, 102, 241, 0.8)',
                        secondary: 'rgba(167, 139, 250, 0.8)',
                        dark: 'rgba(15, 23, 42, 0.8)'
                    },
                    boxShadow: {
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.1)',
                        'neon': '0 0 10px rgba(99, 102, 241, 0.8)'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #1e0338, #0f172a);
            background-size: 400% 400%;
            min-height: 100vh;
            overflow-x: hidden;
            animation: gradientBG 15s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }
        
        .glass-card {
            background: linear-gradient(
                135deg, 
                rgba(30, 41, 59, 0.4) 0%, 
                rgba(19, 25, 39, 0.5) 100%) padding-box;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            animation: fadeIn 0.8s ease-out;
            box-shadow: 
                0 4px 24px rgba(0, 0, 0, 0.05),
                inset 0 2px 4px rgba(255, 255, 255, 0.02);
        }
        
        .btn-primary {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: -120%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.15) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(25deg);
            transition: all 600ms ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        
        .btn-primary:hover::before {
            top: 110%;
            left: 110%;
        }
        
        .power-btn {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .power-btn.active {
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.7);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
    </style>
</head>
<body class="text-gray-100">
    <!-- Animated background elements -->
    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="absolute w-64 h-64 rounded-full bg-primary opacity-20 blur-3xl -top-32 -left-32"></div>
        <div class="absolute w-96 h-96 rounded-full bg-secondary opacity-20 blur-3xl -bottom-32 -right-32"></div>
    </div>
    
    <!-- Main content -->
    <div class="container mx-auto px-4 py-16 min-h-screen flex flex-col">
        <div class="flex-grow flex flex-col items-center justify-center">
            <div class="glass-card p-8 w-full max-w-2xl text-center">
                <h1 class="text-4xl md:text-5xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-300">
                    Welcome
                </h1>
                <p class="text-lg text-gray-300 mb-8">
                    To the Dual System Controller
                </p>
                
                <div class="mb-8">
                    <img src="https://storage.googleapis.com/workspace-0f70711f-8b4e-4d94-86f1-2a93ccde5887/image/3c2c830f-240b-493d-9b49-7244d10b11cc.png" 
                         alt="High-tech server rack with LED lighting showing two motherboards connected to multiple hard drives and cooling systems" 
                         class="w-full h-auto rounded-xl glass-card border border-gray-700">
                </div>
                
                <button onclick="window.location.href='/login'" 
                        class="btn-primary px-8 py-3 bg-primary rounded-lg text-white font-semibold text-lg">
                    Sign In
                </button>
            </div>
        </div>
        
        <footer class="mt-8 text-center">
            <p class="text-transparent bg-clip-text bg-gradient-to-r from-gray-400 to-gray-300 text-sm">
                Made with <span class="text-purple-300 animate-pulse">❤</span> by Prime
            </p>
        </footer>
    </div>
</body>
</html>
