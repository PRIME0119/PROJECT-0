<!-- templates/terminal.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
    <title>DOMINUS | Terminal Access</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        dominus: {
                            accent: '#00ff66', /* Hacker green for terminal */
                            dark: '#020c1b',
                            panel: 'rgba(10, 25, 47, 0.75)'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            background-color: #020c1b;
            color: #00ff66;
            font-family: 'Rajdhani', sans-serif;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 50%, rgba(0, 255, 102, 0.05) 0%, transparent 60%);
            z-index: -2;
            animation: pulse-bg 10s ease-in-out infinite alternate;
        }

        @keyframes pulse-bg {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .main-layout {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            position: relative;
            z-index: 10;
        }

        /* Glassmorphism Panel */
        .panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: var(--tw-colors-dominus-panel);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 102, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 255, 102, 0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 102, 0.5), transparent);
        }

        /* Header Layout */
        .sys-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0, 255, 102, 0.15);
            margin-bottom: 1rem;
        }

        .command-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            color: #00ff66;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Buttons */
        .btn-action-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border: 1px solid rgba(230, 241, 255, 0.3);
            background: rgba(230, 241, 255, 0.05);
            color: rgba(230, 241, 255, 0.8);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-action-back:hover {
            background: rgba(230, 241, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        /* Terminal Area */
        #terminal-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Scanline effect */
        #terminal-wrapper::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #00ff66;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.4);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #terminal::-webkit-scrollbar {
            width: 8px;
        }
        #terminal::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        #terminal::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 102, 0.3);
            border-radius: 4px;
        }
        #terminal::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 102, 0.6);
        }

        /* Input Area */
        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(0, 255, 102, 0.2);
            padding: 0.75rem 1rem;
            position: relative;
            z-index: 10;
        }

        .input-prefix {
            font-family: 'JetBrains Mono', monospace;
            color: #00e5ff;
            margin-right: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }

        #input {
            flex: 1;
            background: transparent;
            color: #fff;
            border: none;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            caret-color: #00ff66;
            width: 100%;
        }
        
        #input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
        }

        @media (max-width: 768px) {
            .main-layout { padding: 0.5rem; }
            .sys-header { flex-direction: column; gap: 1rem; align-items: stretch; }
            .command-title { font-size: 1.25rem; justify-content: center; }
            .btn-action-back { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        
        <div class="panel p-4 md:p-6">
            <!-- Header -->
            <div class="sys-header">
                <h1 class="command-title">
                    <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    ROOT TERMINAL
                </h1>
                
                <button onclick="window.location.href='/control_panel'" class="btn-action-back">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Command Ctrl
                </button>
            </div>

            <!-- Terminal Area -->
            <div id="terminal-wrapper">
                <div id="terminal"></div>
            </div>
            
            <!-- Input Area placed outside wrapper so scanline doesn't cover it -->
            <div class="input-wrapper">
                <span class="input-prefix">root@dominus:~#</span>
                <input id="input" type="text" placeholder="Awaiting command sequence..." autocomplete="off" spellcheck="false"/>
            </div>
            
        </div>

    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('input');
        const socket = io('/terminal');

        function appendOutput(text, isCommand = false) {
            const span = document.createElement('span');
            if (isCommand) {
                span.style.color = '#fff';
                span.style.fontWeight = 'bold';
            }
            span.textContent = text;
            terminal.appendChild(span);
        }

        socket.on('connect', () => {
            appendOutput('DOMINUS SECURE SHELL v2.4.1\n', true);
            appendOutput('[SYSTEM] Connection established.\n\n');
        });

        socket.on('terminal_output', data => {
            appendOutput(data.data);
            requestAnimationFrame(() => {
                terminal.scrollTop = terminal.scrollHeight;
            });
        });

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const cmd = this.value.trim();
                if (cmd.length > 0) {
                    socket.emit('terminal_input', { data: cmd + '\n' });
                    appendOutput('root@dominus:~# ' + cmd + '\n', true);
                    requestAnimationFrame(() => {
                        terminal.scrollTop = terminal.scrollHeight;
                    });
                }
                this.value = '';
            }
        });

        // Focus management
        document.getElementById('terminal-wrapper').addEventListener('click', () => {
            input.focus();
        });
        
        setTimeout(() => input.focus(), 300);
    </script>
</body>
</html>
