<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOMINUS | Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        dominus: {
                            accent: '#00e5ff',
                            dark: '#020c1b',
                            panel: 'rgba(10, 25, 47, 0.65)'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            background-color: #020c1b;
            color: #e6f1ff;
            font-family: 'Rajdhani', sans-serif;
            perspective: 1000px;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 238, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(138, 43, 226, 0.05) 0%, transparent 40%);
            z-index: -2;
            animation: pulse-bg 15s ease-in-out infinite alternate;
        }

        @keyframes pulse-bg {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .main-layout {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            position: relative;
            z-index: 10;
        }

        /* Glassmorphism Panel Base */
        .panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: var(--tw-colors-dominus-panel);
            border-radius: 12px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 0 15px rgba(0, 229, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.4), transparent);
        }

        /* Dashboard Grid Layout - KEY FOR NO SCROLLING */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            grid-template-rows: auto 1fr;
            grid-auto-rows: minmax(150px, auto);
            gap: 1.25rem;
            height: 100%;
            flex: 1;
            /* Allow internal scaling rather than page scroll */
            align-content: start;
        }

        /* Top Header Area inside grid */
        .dashboard-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            margin-bottom: 0.5rem;
        }

        .command-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            color: #00e5ff;
            margin: 0;
            line-height: 1;
        }

        /* Stat Cards */
        .stat-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out, box-shadow 0.3s ease, border-color 0.3s ease;
            will-change: transform;
        }

        .stat-card:hover {
            border-color: rgba(0, 229, 255, 0.5);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 229, 255, 0.1);
        }

        /* The 3D wrapper */
        .tilt-wrapper {
            transform: translateZ(20px);
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
        }

        .stat-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            color: rgba(230, 241, 255, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: auto;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* Progress bars */
        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00e5ff, #8a2be2);
            border-radius: 2px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px #00e5ff;
        }

        /* System Buttons (Grid spanning) */
        .system-btn {
            cursor: pointer;
            text-align: center;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0, 229, 255, 0.2);
            min-height: 200px;
        }

        .system-btn:hover {
            background: rgba(0, 229, 255, 0.08);
            border-color: #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2), inset 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .sys-icon {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1rem;
            border: 1px solid rgba(0, 229, 255, 0.3);
            transition: all 0.3s ease;
        }

        .system-btn:hover .sys-icon {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            transform: scale(1.1);
        }

        .sys-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        /* Top terminal btn */
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #00e5ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-action:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            transform: translateY(-1px);
        }

        .btn-action-logout {
            border-color: rgba(255, 59, 48, 0.4);
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.05);
        }
        .btn-action-logout:hover {
            background: rgba(255, 59, 48, 0.15);
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.3);
        }

        @media (max-width: 768px) {
            .main-layout {
                padding: 1rem;
                overflow-y: auto; /* Fallback for mobile if grid is too tall */
            }
            .dashboard-grid {
                display: flex;
                flex-direction: column;
                height: auto;
            }
            .command-title {
                font-size: 1.5rem;
            }
            .dashboard-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }
            .header-actions {
                display: flex;
                justify-content: space-between;
            }
        }
        
        /* Utility color classes used by JS */
        .text-green-500 { color: #00ff66 !important; text-shadow: 0 0 8px rgba(0,255,102,0.5); }
        .bg-green-500 { background-color: #00ff66 !important; box-shadow: 0 0 10px rgba(0,255,102,0.5); }
        .text-yellow-500 { color: #ffcc00 !important; text-shadow: 0 0 8px rgba(255,204,0,0.5); }
        .border-yellow-500 { border-color: #ffcc00 !important; box-shadow: 0 0 15px rgba(255,204,0,0.2) inset !important; }
        .text-gray-500 { color: rgba(255,255,255,0.3) !important; }
        .bg-gray-500 { background-color: rgba(255,255,255,0.3) !important; }
    </style>
</head>
<body>
    <div class="main-layout">
        
        <div class="dashboard-grid">
            
            <!-- Dashboard Header -->
            <div class="dashboard-header">
                <div>
                    <h1 class="command-title">DOMINUS COMMAND</h1>
                    <p class="text-xs font-mono text-dominus-accent opacity-60 tracking-widest mt-1">SYS.METRICS // REALTIME</p>
                </div>
                <div class="header-actions flex gap-3">
                    <button class="btn-action btn-action-logout" onclick="window.location.href='/logout'">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        Logout
                    </button>
                    <button id="terminalBtn" class="btn-action">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Terminal
                    </button>
                </div>
            </div>

            <!-- CPU Card -->
            <div class="panel stat-card tilt-card">
                <div class="tilt-wrapper">
                    <div class="stat-header">
                        <span>CPU UTILIZATION</span>
                        <svg class="w-6 h-6 text-dominus-accent opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                    </div>
                    <div class="stat-value mt-4 mb-2" id="cpuPercent">0%</div>
                    <div class="progress-track" style="margin-top: auto;">
                        <div class="progress-fill" id="cpuBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- RAM Card -->
            <div class="panel stat-card tilt-card">
                <div class="tilt-wrapper">
                    <div class="stat-header">
                        <span>MEMORY ALLOC</span>
                        <svg class="w-6 h-6 text-purple-400 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m-4 5v6m-8-6v6"></path></svg>
                    </div>
                    <div class="stat-value mt-4 mb-2" id="ramPercent">0%</div>
                    <div class="progress-track" style="margin-top: auto;">
                        <div class="progress-fill" id="ramBar" style="width: 0%; background: linear-gradient(90deg, #b026ff, #ff0099); box-shadow: 0 0 10px #b026ff;"></div>
                    </div>
                </div>
            </div>

            <!-- Storage Card -->
            <div class="panel stat-card tilt-card">
                 <div class="tilt-wrapper">
                    <div class="stat-header">
                        <span>STORAGE CAP</span>
                        <svg class="w-6 h-6 text-pink-400 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                    </div>
                    <div class="stat-value mt-4 mb-2" id="storagePercent">0%</div>
                    <div class="progress-track" style="margin-top: auto;">
                        <div class="progress-fill" id="storageBar" style="width: 0%; background: linear-gradient(90deg, #ff006e, #ffbe0b); box-shadow: 0 0 10px #ff006e;"></div>
                    </div>
                </div>
            </div>

            <!-- Network Card -->
            <div class="panel stat-card tilt-card">
                <div class="tilt-wrapper">
                    <div class="stat-header">
                        <span>NET.TRAFFIC</span>
                        <svg class="w-6 h-6 text-green-400 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div class="mt-4 flex flex-col gap-2" style="margin-top: auto;">
                        <div class="flex justify-between items-end">
                            <span class="text-xs font-mono text-gray-400">UPLINK</span>
                            <span class="text-xl font-bold text-white text-shadow" id="networkUp">0.0 Mbps</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-xs font-mono text-gray-400">DOWNLK</span>
                            <span class="text-xl font-bold text-white text-shadow" id="networkDown">0.0 Mbps</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- System 1 Button -->
            <div class="panel system-btn tilt-card" id="system1-btn" data-system="system1" style="grid-column: span min(2, 100%);">
                <div class="tilt-wrapper" style="align-items: center; justify-content: center;">
                    <div class="sys-icon">
                        <svg class="w-8 h-8 text-dominus-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                    </div>
                    <h3 class="sys-title">NODE ALPHA [SYS.1]</h3>
                    <p class="text-xs font-mono text-gray-400 mb-4">PRIMARY CONTROLLER ARCHITECTURE</p>
                    <div class="font-mono text-xs flex items-center bg-black/30 px-3 py-1.5 rounded-full border border-white/5">
                        <div class="status-indicator w-2 h-2 bg-gray-500 rounded-full mr-2 shadow-[0_0_5px_rgba(255,255,255,0.3)]"></div>
                        <span class="status-text tracking-widest text-gray-500">AWAITING SYNC</span>
                    </div>
                </div>
            </div>

            <!-- System 2 Button -->
            <div class="panel system-btn tilt-card" id="system2-btn" data-system="system2" style="grid-column: span min(2, 100%);">
                 <div class="tilt-wrapper" style="align-items: center; justify-content: center;">
                    <div class="sys-icon" style="color: #b026ff; box-shadow: 0 0 15px rgba(176,38,255,0.1); border-color: rgba(176,38,255,0.3);">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </div>
                    <h3 class="sys-title" style="text-shadow: 0 0 10px rgba(176,38,255,0.5);">NODE BETA  [SYS.2]</h3>
                    <p class="text-xs font-mono text-gray-400 mb-4">SECONDARY AUXILIARY SYSTEM</p>
                    <div class="font-mono text-xs flex items-center bg-black/30 px-3 py-1.5 rounded-full border border-white/5">
                        <div class="status-indicator w-2 h-2 bg-gray-500 rounded-full mr-2 shadow-[0_0_5px_rgba(255,255,255,0.3)]"></div>
                        <span class="status-text tracking-widest text-gray-500">AWAITING SYNC</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- JS functionality perfectly preserved from original -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Connect to SocketIO
        const socket = io();

        // Terminal button
        document.getElementById('terminalBtn').addEventListener('click', function() {
            window.location.href = '/terminal';
        });

        // System button actions
        document.querySelectorAll('.system-btn').forEach(button => {
            button.addEventListener('click', function() {
                const system = this.dataset.system;
                window.location.href = `/${system}`;
                fetch(`/api/select_system/${system}`).catch(() => {});
            });
        });

        // Update stats function
        function updateStats() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById("cpuPercent").textContent = data.cpu;
                    document.getElementById("ramPercent").textContent = data.ram;
                    document.getElementById("storagePercent").textContent = data.storage || "N/A";
                    document.getElementById("networkUp").textContent = data.net_sent;
                    document.getElementById("networkDown").textContent = data.net_recv;
                    
                    document.getElementById("cpuBar").style.width = data.cpu;
                    document.getElementById("ramBar").style.width = data.ram;
                    document.getElementById("storageBar").style.width = data.storage;
                })
                .catch(err => console.error("Error fetching stats:", err));
        }

        // Start polling
        updateStats();
        setInterval(updateStats, window.innerWidth < 768 ? 4000 : 2000);

        // Handle system state updates
        socket.on('system_state', function(state) {
            // ===== SYSTEM 1 =====
            const sys1Btn = document.getElementById('system1-btn');
            const sys1Dot = sys1Btn.querySelector('.status-indicator');
            const sys1Text = sys1Btn.querySelector('.status-text');

            if (state.system1.power) {
                sys1Dot.className = 'status-indicator w-2 h-2 bg-green-500 rounded-full mr-2 shadow-[0_0_8px_#00ff66]';
                sys1Text.textContent = 'ONLINE';
                sys1Text.className = 'status-text tracking-widest text-green-500 font-bold';
            } else {
                sys1Dot.className = 'status-indicator w-2 h-2 bg-gray-500 rounded-full mr-2';
                sys1Text.textContent = 'OFFLINE';
                sys1Text.className = 'status-text tracking-widest text-gray-500';
            }
            if (state.system1.mode === 'local') {
                sys1Text.textContent = `${sys1Text.textContent} // LOCAL`;
                sys1Btn.classList.add('border-yellow-500');
                sys1Text.classList.replace('text-green-500', 'text-yellow-500');
                sys1Dot.classList.replace('bg-green-500', 'bg-yellow-500');
                sys1Dot.classList.replace('shadow-[0_0_8px_#00ff66]', 'shadow-[0_0_8px_#ffcc00]');
            } else {
                sys1Btn.classList.remove('border-yellow-500');
            }

            // ===== SYSTEM 2 =====
            const sys2Btn = document.getElementById('system2-btn');
            const sys2Dot = sys2Btn.querySelector('.status-indicator');
            const sys2Text = sys2Btn.querySelector('.status-text');

            if (state.system2.power) {
                sys2Dot.className = 'status-indicator w-2 h-2 bg-green-500 rounded-full mr-2 shadow-[0_0_8px_#00ff66]';
                sys2Text.textContent = 'ONLINE';
                sys2Text.className = 'status-text tracking-widest text-green-500 font-bold';
            } else {
                sys2Dot.className = 'status-indicator w-2 h-2 bg-gray-500 rounded-full mr-2';
                sys2Text.textContent = 'OFFLINE';
                sys2Text.className = 'status-text tracking-widest text-gray-500';
            }
            if (state.system2.mode === 'local') {
                sys2Text.textContent = `${sys2Text.textContent} // LOCAL`;
                sys2Btn.classList.add('border-yellow-500');
                sys2Text.classList.replace('text-green-500', 'text-yellow-500');
                sys2Dot.classList.replace('bg-green-500', 'bg-yellow-500');
                sys2Dot.classList.replace('shadow-[0_0_8px_#00ff66]', 'shadow-[0_0_8px_#ffcc00]');
            } else {
                sys2Btn.classList.remove('border-yellow-500');
            }
        });

        // 3D Tilt Effect applied to all cards
        const tiltCards = document.querySelectorAll('.tilt-card');
        let isMobile = window.innerWidth <= 768;

        window.addEventListener('resize', () => {
            isMobile = window.innerWidth <= 768;
            if (isMobile) {
                tiltCards.forEach(card => card.style.transform = `perspective(1000px) rotateX(0) rotateY(0)`);
            }
        });

        tiltCards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                if (isMobile) return;
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Calculate rotation (max 10 degrees)
                const rotateX = ((y - centerY) / centerY) * -10;
                const rotateY = ((x - centerX) / centerX) * 10;
                
                requestAnimationFrame(() => {
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                });
            });

            card.addEventListener('mouseleave', () => {
                if (isMobile) return;
                card.style.transition = 'transform 0.5s ease-out, box-shadow 0.3s ease, border-color 0.3s ease';
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
                setTimeout(() => {
                    card.style.transition = 'transform 0.2s ease-out, box-shadow 0.3s ease, border-color 0.3s ease';
                }, 500);
            });
        });
    </script>
</body>
</html>
