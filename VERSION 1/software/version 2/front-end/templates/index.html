<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOMINUS | Systems Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        dominus: {
                            glow: 'rgba(0, 238, 255, 0.8)',
                            primary: 'rgba(10, 25, 47, 0.85)',
                            secondary: 'rgba(2, 12, 27, 0.95)',
                            accent: '#00e5ff'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            background-color: #020c1b;
            color: #e6f1ff;
            font-family: 'Rajdhani', sans-serif;
            perspective: 1000px;
        }

        /* Animated Subtly Glowing Background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 238, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.05) 0%, transparent 50%);
            z-index: -2;
            animation: pulse-bg 10s ease-in-out infinite alternate;
        }
        
        @keyframes pulse-bg {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .main-layout {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .hero-background {
            position: absolute;
            inset: 0;
            /* Placeholder for actual logo, using radial gradient to mimic center glow for now */
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.15) 0%, transparent 60%);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.5;
            z-index: -1;
            pointer-events: none;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            letter-spacing: 0.25em;
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #00e5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.4));
            animation: title-glow 3s ease-in-out infinite alternate;
            margin: 0;
            padding: 0;
            line-height: 1;
        }

        @keyframes title-glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.2)); }
            to { filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.8)); }
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.5rem);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-top: 1rem;
            margin-bottom: 3rem;
        }

        .panel {
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            background: rgba(10, 25, 47, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 229, 255, 0.05);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            will-change: transform;
            position: relative;
            overflow: hidden;
        }

        .panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.5), transparent);
        }

        .btn-glass {
            position: relative;
            overflow: hidden;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #00e5ff;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .btn-glass::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.2), transparent);
            transform: skewX(-20deg);
            transition: all 0.5s ease;
        }

        .btn-glass:hover {
            background: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4), inset 0 0 10px rgba(0, 229, 255, 0.2);
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
            border-color: rgba(0, 229, 255, 0.8);
            transform: translateY(-2px);
        }

        .btn-glass:hover::before {
            left: 150%;
        }

        .btn-glass:active {
            transform: translateY(1px);
        }

        /* 3D Tilt Effect applied via JS */
        
        @media (max-width: 768px) {
            .hero-title {
                letter-spacing: 0.1em;
            }
            .subtitle {
                letter-spacing: 0.2em;
            }
            .btn-glass {
                min-height: 56px; /* Larger touch target */
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    
    <div class="hero-background"></div>

    <div class="main-layout px-4">
        
        <div class="panel p-8 md:p-12 max-w-2xl w-full text-center tilt-panel" id="mainPanel">
            <!-- Content wrapper inside panel to enhance 3D depth -->
            <div style="transform: translateZ(30px);">
                <h1 class="hero-title">DOMINUS</h1>
                <p class="subtitle">Command Core Online</p>
                
                <div class="mt-12">
                    <button onclick="window.location.href='/login'" 
                            class="btn-glass px-10 py-4 mx-auto rounded-lg text-lg w-full md:w-auto min-w-[200px] cursor-pointer">
                        Initialize Access
                    </button>
                </div>
            </div>
        </div>
        
        <footer class="absolute bottom-6 text-center w-full" style="transform: translateZ(10px);">
            <p class="text-xs tracking-widest text-dominus-accent opacity-50 font-mono">
                SYS.AUTH // PRIME_CONTROL_NODE
            </p>
        </footer>
    </div>

    <script>
        // 3D Tilt Effect for Desktop
        const panel = document.getElementById('mainPanel');
        let isMobile = window.innerWidth <= 768;

        window.addEventListener('resize', () => {
            isMobile = window.innerWidth <= 768;
            if (isMobile) {
                panel.style.transform = `perspective(1000px) rotateX(0) rotateY(0)`;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isMobile) return;

            const xAxis = (window.innerWidth / 2 - e.pageX) / 40; 
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40; 

            // Throttle slightly and apply
            requestAnimationFrame(() => {
                panel.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        });

        // Reset on leave
        document.addEventListener('mouseleave', () => {
            if (isMobile) return;
            panel.style.transition = 'transform 0.5s ease';
            panel.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
            setTimeout(() => {
                panel.style.transition = 'transform 0.1s ease-out, box-shadow 0.3s ease';
            }, 500);
        });
    </script>
</body>
</html>
