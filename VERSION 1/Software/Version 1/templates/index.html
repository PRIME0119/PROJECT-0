<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMINUS | Project 0 Version 1</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <script>
        // Check theme immediately to prevent flash
        if(localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --glass-bg: rgba(20, 30, 45, 0.35);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            --accent-violet: #8b5cf6;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --bg-3: #1e0338;
            --orb-1: #6366f1; /* indigo-500 */
            --orb-2: #a855f7; /* purple-500 */
        }

        html.light-theme {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 20px 50px rgba(100, 150, 255, 0.15);
            --accent-violet: #3b82f6; /* bright blue */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-1: #e0f2fe; /* sky-100 */
            --bg-2: #f0f9ff; /* sky-50 */
            --bg-3: #bae6fd;
            --orb-1: #93c5fd; /* blue-300 */
            --orb-2: #67e8f9; /* cyan-300 */
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 400% 400%;
            height: 100vh; /* Fallback */
            height: 100dvh;
            overflow: hidden;
            color: var(--text-main);
            animation: gradientBG 15s ease infinite;
            perspective: 1000px;
            transition: background 0.8s ease, color 0.8s ease;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        .blur-bg {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            z-index: -1;
        }

        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 2rem;
            box-sizing: border-box;
            transform-style: preserve-3d;
        }

        .hero-image {
            max-height: 25vh; /* 30% smaller on mobile */
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.6s ease;
            background: var(--glass-bg);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        
        @media (min-width: 768px) {
            .hero-image {
                max-height: 40vh; /* Original size on PC */
            }
        }
        
        .hero-image:hover {
            transform: translateZ(30px) rotateX(2deg) rotateY(-2deg) scale(1.02);
            box-shadow: 0 25px 50px rgba(139, 92, 246, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        html.light-theme .hero-image:hover {
            box-shadow: 0 25px 50px rgba(59, 130, 246, 0.4);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .title-text {
            font-size: 2.5rem; /* ~30% smaller on mobile */
            font-weight: 800;
            letter-spacing: -0.05em;
            margin: 0;
            background: linear-gradient(135deg, var(--text-main) 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 0.8s ease-out;
            transform: translateZ(20px);
        }
        
        @media (min-width: 768px) {
            .title-text { font-size: 3.5rem; }
        }

        html.light-theme .title-text {
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .subtitle-text {
            font-size: 0.9rem; /* ~30% smaller on mobile */
            font-weight: 400;
            color: var(--text-muted);
            margin: 0.5rem 0 2rem 0;
            letter-spacing: 0.02em;
            animation: slideUp 0.9s ease-out;
            transform: translateZ(10px);
            text-align: center;
        }

        @media (min-width: 768px) {
            .subtitle-text { font-size: 1.25rem; margin-bottom: 2.5rem; }
        }

        .glass-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: var(--glass-border);
            border-radius: 16px;
            color: var(--text-main);
            font-size: 0.9rem; /* Smaller text on mobile */
            font-weight: 600;
            padding: 0.75rem 3rem; /* Smaller padding on mobile */
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 1s ease-out;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            box-shadow: var(--glass-shadow);
        }
        
        @media (min-width: 768px) {
            .glass-btn {
                font-size: 1.125rem;
                padding: 1rem 4rem;
            }
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .glass-btn:hover {
            transform: translateZ(40px) translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
            border-color: rgba(255, 255, 255, 0.4);
        }

        html.light-theme .glass-btn:hover {
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.4);
            border-color: rgba(255, 255, 255, 1);
            background: rgba(255, 255, 255, 0.9);
        }

        .glass-btn:hover::before {
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-text {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            transform: translateZ(5px);
        }
        
        /* Particles for light theme */
        .snow-particle {
            display: none;
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px white;
            z-index: -1;
            animation: fall linear infinite;
        }
        html.light-theme .snow-particle {
            display: block;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

    </style>
</head>
<body>
    <div id="particles-container"></div>
    <div class="blur-bg"></div>
    
    <!-- Animated background elements (Colors injected via inline style reacting to CSS vars) -->
    <div class="fixed inset-0 overflow-hidden -z-10 bg-transparent transition-colors duration-700">
        <div class="absolute w-64 h-64 rounded-full opacity-20 blur-3xl -top-32 -left-32 transition-colors duration-700" style="background-color: var(--orb-1)"></div>
        <div class="absolute w-96 h-96 rounded-full opacity-20 blur-3xl -bottom-32 -right-32 transition-colors duration-700" style="background-color: var(--orb-2)"></div>
    </div>
    
    <div class="hero-container">
        <img src="https://storage.googleapis.com/workspace-0f70711f-8b4e-4d94-86f1-2a93ccde5887/image/3c2c830f-240b-493d-9b49-7244d10b11cc.png" 
             alt="System Image" 
             class="hero-image backdrop-blur-sm p-4">
        
        <h1 class="title-text">DOMINUS</h1>
        <p class="subtitle-text">Powered by Pi, Controlled with Precision</p>
        
        <button onclick="window.location.href='/login'" class="glass-btn">
            Sign In
        </button>

        <div class="footer-text">
            Project 0 Version 1
        </div>
    </div>
    
    <script>
        // Generate particles for light theme
        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 50; i++) {
                let p = document.createElement('div');
                p.classList.add('snow-particle');
                p.style.width = Math.random() * 5 + 2 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = -10 + 'px';
                p.style.opacity = Math.random();
                p.style.animationDuration = Math.random() * 8 + 4 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // Listen for storage changes if theme toggled in another tab
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                if (e.newValue === 'light') document.documentElement.classList.add('light-theme');
                else document.documentElement.classList.remove('light-theme');
            }
        });
    </script>
</body>
</html>
